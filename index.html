<!DOCTYPE html>
<html>
    <head>
        <script src="night_day.js" defer></script>
        <script src="add_todo.js" ></script>
        <script src="change_user.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <meta charset="utf-8">
        <meta name="viewpart" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="allCenter" style="text-align: center;">
        
        <h3 style="display: inline; margin:50px;">TODO</h3>
        <input type="button" value="Change User" onclick="changeUser()">
        <input type="button" value="Dark mode" onclick="dayNightHandler(this)">
        </div>

        <div class="mygrid">
        <div></div>
        <div>
        <input id="todo" type="text" placeholder="write todo">
        <input id="addbutton" type="button" value="Enter" onclick="addTodo()">
        <input type="button" value="Delete whole todos" onclick="eraseAll()">
        <div style="margin: 20px;"></div>
        
        
        <div id="todoCheckContainer"></div>
        </div>

        <script>
            //11.27 2hours -> came after long time -> read & understand codes
            //11.28 2.5hours -> realized save & load
            //09.12 4 hours -> (change_user)this will be used to other thing

            let username = 'Lio';

            //TODO : change user -> create user일때, write todo에 마우스 못가져가게 하기

            //TODO : let move todos up or down

            document.getElementById("todo").focus();
            let todoArray = [];
            const container = document.getElementById('todoCheckContainer');

            //add with "Enter" from textfield too like button
            const tvalue = document.getElementById('todo');
            tvalue.addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    document.getElementById("addbutton").click();
                }
            });

            //loading
            let savedtodos = localStorage.getItem(`user_${username}`) || '[]';
            //parsing
            let parsing = JSON.parse(savedtodos);
            parsing.forEach(item => {
                todoArray.push(item);
                renderTodo(item);
            });
        </script>
        <br>           

        <!--TODO logo at the bottom--> 

    </body>
</html>
