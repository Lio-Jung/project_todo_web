<!DOCTYPE html>
<html>
    <head>
        <script src="night_day.js"></script>
        <script src="add_todo.js"></script>
        <meta charset="utf-8">
        <style>
            #todo::placeholder{
                color: rgb(90,90,90);
            }
            .right{
                float: right;
                margin-left: 5px;
            }
        </style>
    </head>
    <body>        
        <input class="right" type="button" value="Change user" onclick="changeUser()">
        <input class="right" type="button" value="Dark mode" onclick="dayNightHandler(this)">
        <h3>TODO</h3>
        
        <input id="todo" type="text" placeholder="write todo">
        <input id="addbutton" type="button" value="Enter" onclick="addTodo()">
        <input type="button" value="Delete whole todos" onclick="eraseAll()">
        <div id="todoCheckContainer"></div>

        <script>
            //11.27 2hours -> came after long time -> read & understand codes
            //11.28 2.5hours -> realized save & load


            //TODO: user
            let username = 'lio';


            //TODO : let move todos up or down


            document.getElementById("todo").focus();
            let todoArray = [];
            const container = document.getElementById('todoCheckContainer');

            //add with "Enter" from textfield too like button
            const tvalue = document.getElementById('todo');
            tvalue.addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    document.getElementById("addbutton").click();
                }
            });

            //loading
            let savedtodos = localStorage.getItem(`user_${username}`) || '[]';
            //parsing
            let parsing = JSON.parse(savedtodos);
            parsing.forEach(item => {
                todoArray.push(item);
                renderTodo(item);
            });
        </script>
        <br>           

    </body>
</html>
